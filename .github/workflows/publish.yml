name: Publish to PyPI

# Runs when a GitHub Release is published (Releases → Draft a new release →
# Publish release). Builds the sdist/wheel and uploads via PyPI Trusted
# Publishing — no API token stored in this repo.
#
# One-time setup required on pypi.org before this works (see PUBLISHING.md):
#   1. Create the `agent-walkforward` project on PyPI (first upload can also
#      create it if you do a manual `twine upload` once, OR configure a
#      "pending publisher" before any release exists).
#   2. PyPI → your project → Settings → Publishing → Add a trusted publisher:
#        Owner:        Starlight143
#        Repository:   agent-walkforward
#        Workflow:     publish.yml
#        Environment:  pypi   (must match the `environment:` below)

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
